# Tiny Tapeout project information
project:
  title:         "Simple Sprinkler"      
  author:        "Noah Perez"      
  discord:       "infamousnzp"      
  description:   "Simple sprinkler that functions based on 4 conditions."    
  language:      "Wokwi" 
  clock_hz:       0
  tiles:         "1x1"
  how_it_works:  "The Simple Sprinkler depends on 2 conditions to properly function: the sprinkler system must 
                  be enabled and it must have a sufficient supply of water. Of those 2 conditions, they are 
                  dependent on a further 4 conditions.
                  - A (Rain)
                    - A = 1 (Currently raining)
                    - A = 0 (Not raining)
                  - B (Water Supply)
                    - B = 1 (Sufficient water available)
                    - B = 0 (Water supply insufficient)
                  - C (Soil Moisture)
                    - C = 1 (Soil is already moist)
                    - C = 0 (Soil is dry)
                  - D (Time)
                    - D = 1 (Current time is within watering period)
                    - D = 0 ((Current time is not within watering period)
                  "       
  how_to_test:    "Adjust the inputs to see which combinations toggle the LEDs. For the sprinkler to fully function
                   both LEDs must be lit. The truth table is included in README.md.
                  "
  wokwi_id:       451184391728659457
  external_hw: "None"
  picture: "image/SimpleSprinkler.drawio.png"
pinout:
  # Inputs
  ui[0]: "Rain (A)"
  ui[1]: "Water Supply (B)"
  ui[2]: "Soil Moisture (C)"
  ui[3]: "Time (D)"
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "Sprinkler System (S)"
  uo[1]: "Water Supply (W)"
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
